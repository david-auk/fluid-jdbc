name: release
on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests (pinned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build & test (excluding @Tag("latest"))
        run: ./gradlew clean test -Djunit.jupiter.tags.exclude=latest --no-daemon --stacktrace

  test_latest:
    name: Unit tests (latest images, allowed to fail)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run only @Tag("latest") tests (allowed to fail)
        run: ./gradlew test -Djunit.jupiter.tags.include=latest --no-daemon --stacktrace

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build & test (excluding @Tag("latest"))
        run: ./gradlew clean test -Djunit.jupiter.tags.exclude=latest --no-daemon --stacktrace

      - name: Configure Gradle credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "mavenCentralUsername=$MAVEN_CENTRAL_USERNAME";
            echo "mavenCentralPassword=$MAVEN_CENTRAL_PASSWORD";
          } >> ~/.gradle/gradle.properties
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Publish to Maven Central (Portal)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToMavenCentral --no-daemon --stacktrace