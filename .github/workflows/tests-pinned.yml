name: tests (pinned)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests (pinned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build & test (excluding @Tag("latest"))
        run: ./gradlew clean test -x publish -Djunit.jupiter.tags.exclude=latest --no-daemon --stacktrace